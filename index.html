<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>停车场实时监控</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div id="container">

      <!-- ====== Left 3/4: Video Area (stacked panels, only active one visible) ====== -->
      <div class="video-area">
        <!-- Parking A video panel (visible initially) -->
        <div class="video-panel active" id="video-a">
          <div class="video-placeholder" id="placeholder-a">
            <span class="icon">📡</span>
            <span class="text">暂无信号</span>
            <span class="sub">等待视频接入…</span>
          </div>
        </div>

        <!-- Parking B video panel (hidden initially) -->
        <div class="video-panel" id="video-b">
          <div class="video-placeholder" id="placeholder-b">
            <span class="icon">📡</span>
            <span class="text">暂无信号</span>
            <span class="sub">等待视频接入…</span>
          </div>
        </div>
      </div>

      <!-- ====== Right 1/4: Single Parking Info Card ====== -->
      <div class="parking-card" id="card-current">
        <span class="status-dot" id="status-dot-current" title="数据连接状态"></span>
        <div class="stats-stack">
          <div class="stat-line name">
            <span class="stat-value" id="name-current">加载中...</span>
          </div>
          <div class="stat-line available">
            <span class="stat-label">空闲车位：</span>
            <span class="stat-value" id="available-current">--</span>
            <span class="stat-unit">个</span>
          </div>
          <div class="stat-line total">
            <span class="stat-label">总车位：</span>
            <span class="stat-value" id="total-current">--</span>
            <span class="stat-unit">个</span>
          </div>
        </div>
      </div>

    </div><!-- /#container -->
  </div><!-- /#app -->

  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
