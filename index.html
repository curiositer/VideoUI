<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>停车场实时监控</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div id="container">

      <!-- ====== Left 3/4: Video Area ====== -->
      <div class="video-area">
        <div class="video-panel active" id="video-panel">
          <div class="video-placeholder" id="placeholder-video">
            <span class="icon">📡</span>
            <span class="text">暂无信号</span>
            <span class="sub">等待视频接入…</span>
          </div>
        </div>
      </div>

      <!-- ====== Right 1/4: Parking Info Card ====== -->
      <div class="parking-card" id="card-info">
        <span class="status-dot" id="status-dot" title="数据连接状态"></span>
        <div class="stats-stack">

          <!-- Location name -->
          <div class="stat-name" id="name">加载中...</div>

          <!-- Total parking spaces (red) -->
          <div class="stat-block total">
            <div class="stat-label">总停车位</div>
            <div class="stat-row">
              <span class="stat-value" id="total-spaces">--</span>
              <span class="stat-unit">个</span>
            </div>
          </div>

          <!-- Parking lot available (green) -->
          <div class="stat-block lot-avail">
            <div class="stat-label">停车场空闲车位</div>
            <div class="stat-row">
              <span class="stat-value" id="avail-lot">--</span>
              <span class="stat-unit">个</span>
            </div>
          </div>

          <!-- Parking building available (green) -->
          <div class="stat-block building-avail">
            <div class="stat-label">停车楼空闲车位</div>
            <div class="stat-row">
              <span class="stat-value" id="avail-building">--</span>
              <span class="stat-unit">个</span>
            </div>
          </div>

        </div>
      </div>

    </div><!-- /#container -->
  </div><!-- /#app -->

  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
