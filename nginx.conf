# =============================================================================
#  Parking Display — Nginx Reverse Proxy
#  Unified entry on :80, proxies to Python server + MediaMTX HLS/FLV
#  Also serves local video files from D:/videos/
# =============================================================================

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Disable server version in error pages / headers
    server_tokens off;

    server {
        listen       80;
        server_name  localhost;

        # ---- Python server (static pages + API) ----
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ---- MediaMTX HLS streams ----
        location /hls/ {
            proxy_pass http://127.0.0.1:8888/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            # Disable If-Modified-Since to prevent 304-related video glitches
            proxy_set_header If-Modified-Since "";
        }

        # ---- MediaMTX HTTP-FLV streams ----
        location /flv/ {
            proxy_pass http://127.0.0.1:8887/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
        }

        # ---- MediaMTX WebRTC/WHEP signaling ----
        location /webrtc/ {
            proxy_pass http://127.0.0.1:8889/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ---- Local video files ----
        location /videos/ {
            alias D:/videos/;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }
    }
}
