<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>停车场大屏 — 配置管理</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-body">
  <div class="admin-wrapper">

    <a href="index.html" class="back-link">← 返回大屏</a>

    <h1>⚙ 大屏配置</h1>
    <p class="subtitle">修改配置后点击保存，返回大屏页面刷新即可生效</p>

    <!-- === Display === -->
    <div class="form-section">
      <h2>显示设置</h2>
      <div class="form-group">
        <label for="parkingName">景区名称</label>
        <input type="text" id="parkingName" placeholder="xxxx景区游客中心停车场">
        <span class="hint">大屏顶部显示的停车场名称</span>
      </div>
    </div>

    <!-- === ParkID Mapping === -->
    <div class="form-section">
      <h2>车场标识</h2>

      <div class="form-group">
        <label for="parkIdA">停车场 ParkID</label>
        <input type="text" id="parkIdA" placeholder="20210001">
        <span class="hint">停车场客户端 POST 上报时携带的 parkid，需与 server.py 启动参数 --parkid-a 一致</span>
      </div>

      <div class="form-group">
        <label for="parkIdB">停车楼 ParkID</label>
        <input type="text" id="parkIdB" placeholder="20210002">
        <span class="hint">停车楼客户端 POST 上报时携带的 parkid，需与 server.py 启动参数 --parkid-b 一致</span>
      </div>
    </div>

    <!-- === Polling === -->
    <div class="form-section">
      <h2>数据刷新</h2>

      <div class="form-group">
        <label for="pollInterval">数据刷新间隔（秒）</label>
        <input type="number" id="pollInterval" min="1" max="60" value="2">
        <span class="hint">前端轮询本地服务端 GET /api/parking/status 的频率，默认 2 秒</span>
      </div>
    </div>

    <!-- === Video Streams === -->
    <div class="form-section">
      <h2>监控画面</h2>

      <div class="form-group">
        <label for="videoSwitchInterval">画面切换间隔（秒）</label>
        <input type="number" id="videoSwitchInterval" min="1" max="120" value="10">
        <span class="hint">多路监控画面轮播切换间隔，默认 10 秒</span>
      </div>

      <div id="video-streams-list">
        <!-- Stream rows rendered dynamically by admin.js -->
      </div>

      <button class="btn-add-stream" id="btn-add-stream" type="button">
        ＋ 添加监控画面
      </button>
    </div>

    <!-- === Actions === -->
    <div class="form-actions">
      <button class="btn btn-primary" id="btn-save">保存配置</button>
      <button class="btn btn-secondary" id="btn-reset">恢复默认</button>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
